<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Aula Virtual Assistant</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <span class="logo">🎓</span>
        <div class="header-copy">
          <h1>Asistente UNLu</h1>
          <p>El chat queda abierto en el panel lateral y se guarda localmente.</p>
        </div>
      </header>

      <div class="session-bar">
        <select id="session-select" aria-label="Chats guardados"></select>
        <button id="new-chat-btn" type="button">Nuevo chat</button>
      </div>

      <section class="settings-card">
        <div class="settings-row">
          <label for="provider-select">Motor</label>
          <select id="provider-select" aria-label="Proveedor del modelo">
            <option value="gemini">Gemini</option>
            <option value="ollama">Ollama</option>
          </select>
        </div>

        <div id="gemini-settings" class="provider-settings">
          <label for="gemini-model">Modelo Gemini</label>
          <select id="gemini-model" aria-label="Modelo de Gemini">
            <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
            <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash Lite</option>
          </select>

          <label for="gemini-api-key">API key de Gemini</label>
          <input
            id="gemini-api-key"
            type="password"
            placeholder="Si queda vacía, se usa la del backend"
            autocomplete="off"
          />
        </div>

        <div id="ollama-settings" class="provider-settings hidden">
          <label for="ollama-model">Modelo Ollama</label>
          <select id="ollama-model" aria-label="Modelo de Ollama">
            <option value="qwen2.5">Qwen 2.5</option>
            <option value="llama3.1">Llama 3.1</option>
            <option value="qwen3:14b">Qwen 3 (14B)</option>
          </select>
        </div>

        <p id="provider-hint" class="settings-hint"></p>
      </section>

      <div id="messages" class="messages"></div>

      <div id="not-logged-in" class="notice hidden">
        <p>No se detectó una sesión activa en el Aula Virtual.</p>
        <a href="https://platdig.unlu.edu.ar" target="_blank">Iniciar sesión →</a>
      </div>

      <div class="input-area">
        <textarea
          id="query"
          placeholder="¿Cuáles son las fechas de exámenes de matemática?"
          rows="3"
        ></textarea>
        <button id="send-btn">Enviar</button>
      </div>

      <div id="status" class="status"></div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
